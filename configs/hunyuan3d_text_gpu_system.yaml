model_name: hunyuan3d
input_image: null
input_prompt: inputs/prompts/example.txt
output_root: outputs
dry_run: false
render: false
benchmark: false

models:
  hunyuan3d:
    repo_path: external/Hunyuan3D-2.1
    output_dir: outputs/hunyuan3d
    task_type: image_or_text_to_3d
    inference:
      prefer: text
      command_image: env -u LD_LIBRARY_PATH python3 ../../scripts/hunyuan3d_genlab_infer.py --repo . --mode image --image {input_image} --output-mesh {output_mesh} --model-path tencent/Hunyuan3D-2.1 --subfolder hunyuan3d-dit-v2-1 --device cuda
      command_text: env -u LD_LIBRARY_PATH python3 ../../scripts/hunyuan3d_genlab_infer.py --repo . --mode text --prompt-file {prompt_file} --output-mesh {output_mesh} --model-path tencent/Hunyuan3D-2.1 --subfolder hunyuan3d-dit-v2-1 --device cuda
      generated_mesh: "{output_dir}/{input_stem}_hunyuan3d.obj"
      expected_mesh: "{output_dir}/{input_stem}_hunyuan3d.obj"
      env:
        HF_ENDPOINT: https://hf-mirror.com
